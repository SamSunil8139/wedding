<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aswathi & Sam | Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
font-family:'Montserrat',sans-serif;
background:#f5f1ea;
color:#222;
overflow-x:hidden;
}

/* OPEN SCREEN */

#opening{
position:fixed;
width:100%;
height:100vh;
background:linear-gradient(135deg,#f5f1ea,#e9e2d8);
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
z-index:1000;
transition:1s ease;
}

#opening h1{
font-family:'Playfair Display',serif;
font-size:32px;
letter-spacing:2px;
margin-bottom:30px;
opacity:0;
animation:fadeIn 2s forwards;
}

.open-btn{
padding:14px 40px;
border:none;
background:linear-gradient(45deg,#c6a75e,#e5c97a);
color:#fff;
font-size:15px;
letter-spacing:1px;
border-radius:50px;
cursor:pointer;
transition:.3s;
box-shadow:0 5px 20px rgba(0,0,0,0.15);
}

.open-btn:hover{
transform:scale(1.05);
}

/* HERO */

.hero{
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
text-align:center;
padding:20px;
}

.names{
font-family:'Playfair Display',serif;
font-size:38px;
letter-spacing:2px;
animation:fadeUp 2s ease forwards;
opacity:0;
}

.and{
margin:20px 0;
font-size:18px;
letter-spacing:4px;
color:#c6a75e;
}

.quote{
margin-top:30px;
font-style:italic;
max-width:500px;
color:#777;
}

/* DETAILS CARD */

.details{
background:rgba(255,255,255,0.6);
backdrop-filter:blur(10px);
padding:40px;
margin:50px 20px;
border-radius:20px;
box-shadow:0 10px 40px rgba(0,0,0,0.08);
text-align:center;
}

.details h2{
font-family:'Playfair Display',serif;
margin-bottom:20px;
}

.countdown{
display:flex;
justify-content:center;
gap:15px;
margin-top:30px;
flex-wrap:wrap;
}

.time-box{
background:#fff;
padding:15px 20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,0.08);
}

.time-box span{
display:block;
font-size:22px;
font-weight:600;
color:#c6a75e;
}

.map-btn{
margin-top:30px;
display:inline-block;
padding:12px 30px;
background:linear-gradient(45deg,#c6a75e,#e5c97a);
color:#fff;
border-radius:30px;
text-decoration:none;
transition:.3s;
}

.map-btn:hover{
transform:scale(1.05);
}

/* ANIMATIONS */

@keyframes fadeIn{
to{opacity:1;}
}

@keyframes fadeUp{
from{opacity:0; transform:translateY(30px);}
to{opacity:1; transform:translateY(0);}
}

@media(max-width:768px){
.names{font-size:28px;}
}
</style>
</head>

<body>

<div id="opening">
<h1>You're Invited</h1>
<button class="open-btn" onclick="openInvite()">Open Invitation</button>
</div>

<section class="hero">
<div class="names">Aswathi Ashokan</div>
<div class="and">&</div>
<div class="names">Sam Sunil</div>

<p class="quote">Two souls, one journey, a lifetime together.</p>
</section>

<div class="details">
<h2>Wedding Ceremony</h2>
April 27, 2026<br>
10:00 AM<br>
VTAM Auditorium<br>
Cherthala near Manorama Junction

<div class="countdown" id="countdown"></div>

<a class="map-btn" href="https://maps.app.goo.gl/mobFw1b7dZiGS3Qf7" target="_blank">
View Location
</a>

<p style="margin-top:30px;font-size:14px;color:#666;">
Bride: Ashokan U P & Mohini P K<br>
Groom: Sunil K Samuel & Thresiamma K A
</p>
</div>

<audio id="bgMusic" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_44f7b1c31c.mp3?filename=wedding-love-11085.mp3" type="audio/mpeg">
</audio>

<script>

function openInvite(){
document.getElementById("opening").style.opacity="0";
setTimeout(()=>{document.getElementById("opening").style.display="none";},1000);
document.getElementById("bgMusic").play();
}

const weddingDate = new Date("April 27, 2026 10:00:00").getTime();

setInterval(function(){
const now = new Date().getTime();
const distance = weddingDate - now;

const days = Math.floor(distance / (1000*60*60*24));
const hours = Math.floor((distance % (1000*60*60*24))/(1000*60*60));
const minutes = Math.floor((distance % (1000*60*60))/(1000*60));
const seconds = Math.floor((distance % (1000*60))/1000);

document.getElementById("countdown").innerHTML = `
<div class="time-box"><span>${days}</span>Days</div>
<div class="time-box"><span>${hours}</span>Hours</div>
<div class="time-box"><span>${minutes}</span>Minutes</div>
<div class="time-box"><span>${seconds}</span>Seconds</div>
`;
},1000);

</script>

</body>
</html>

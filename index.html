<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aswathi & Sam | Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Montserrat',sans-serif;
background:#f5f1ea;
overflow:hidden;
}

/* CURTAIN */
#curtain{
position:fixed;
width:100%;
height:100vh;
display:flex;
z-index:1000;
}

.panel{
flex:1;
background:linear-gradient(90deg,#7b1e1e,#a83232);
transition:1.8s ease;
}

#curtain.open .left{transform:translateX(-100%);}
#curtain.open .right{transform:translateX(100%);}

/* SCRATCH SCREEN */
#scratchScreen{
position:fixed;
width:100%;
height:100vh;
background:#f5f1ea;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
z-index:500;
}

#revealText{
font-family:'Playfair Display',serif;
font-size:32px;
text-align:center;
opacity:0;
transition:1s ease;
z-index:1;
}

canvas{
position:absolute;
top:0;
left:0;
}

/* FLOWERS */
.flower{
position:fixed;
top:-20px;
font-size:24px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* MAIN CONTENT */
#mainContent{
display:none;
height:100vh;
overflow-y:auto;
text-align:center;
padding:60px 20px;
}

.names{
font-family:'Playfair Display',serif;
font-size:32px;
margin:15px 0;
}

.details{
margin-top:30px;
line-height:1.8;
}

.map-btn{
margin-top:25px;
display:inline-block;
padding:12px 30px;
background:#c6a75e;
color:#fff;
border-radius:30px;
text-decoration:none;
}

</style>
</head>

<body>

<div id="curtain">
<div class="panel left"></div>
<div class="panel right"></div>
</div>

<div id="scratchScreen">
<div id="revealText">
April 27, 2026<br>
10:00 AM
</div>
<canvas id="scratchCanvas"></canvas>
</div>

<div id="mainContent">
<div class="names">Aswathi Ashokan</div>
<div>&</div>
<div class="names">Sam Sunil</div>

<div class="details">
VTAM Auditorium<br>
Cherthala near Manorama Junction<br><br>

Bride: Ashokan U P & Mohini P K<br>
Groom: Sunil K Samuel & Thresiamma K A
</div>

<a class="map-btn" href="https://maps.app.goo.gl/mobFw1b7dZiGS3Qf7" target="_blank">
View Location
</a>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_44f7b1c31c.mp3?filename=wedding-love-11085.mp3" type="audio/mpeg">
</audio>

<script>

/* Curtain open */
setTimeout(()=>{
document.getElementById("curtain").classList.add("open");
},1200);

/* Scratch Setup */
const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle = "#c6a75e";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;

function getPosition(e){
if(e.touches){
return {x:e.touches[0].clientX, y:e.touches[0].clientY};
}
return {x:e.clientX, y:e.clientY};
}

function scratch(e){
if(!isDrawing) return;
const pos = getPosition(e);
ctx.beginPath();
ctx.arc(pos.x,pos.y,35,0,Math.PI*2);
ctx.fill();
checkReveal();
}

canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",()=>isDrawing=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>isDrawing=true);
canvas.addEventListener("touchend",()=>isDrawing=false);
canvas.addEventListener("touchmove",scratch);

/* Reveal Logic */
function checkReveal(){
const pixels = ctx.getImageData(0,0,canvas.width,canvas.height);
let cleared = 0;

for(let i=0;i<pixels.data.length;i+=4){
if(pixels.data[i+3] === 0) cleared++;
}

if(cleared > pixels.data.length * 0.25){
document.getElementById("revealText").style.opacity="1";
flowerShower();
setTimeout(()=>{
document.getElementById("scratchScreen").style.display="none";
document.getElementById("mainContent").style.display="block";
document.body.style.overflow="auto";
document.getElementById("music").play();
},2500);
}
}

/* Flower Shower */
function flowerShower(){
for(let i=0;i<40;i++){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(flower);
}
}

</script>

</body>
</html>

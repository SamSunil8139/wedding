<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aswathi & Sam | Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Montserrat',sans-serif;
background:#f5f1ea;
overflow:hidden;
text-align:center;
}

/* INTRO SCREEN */

#intro{
position:fixed;
width:100%;
height:100vh;
display:flex;
flex-direction:column;
justify-content:center;
align-items:center;
background:linear-gradient(135deg,#f5f1ea,#e8e1d6);
z-index:1000;
transition:1s ease;
}

#intro h1{
font-family:'Playfair Display',serif;
font-size:30px;
margin-bottom:25px;
}

.open-btn{
padding:14px 40px;
background:linear-gradient(45deg,#c6a75e,#e5c97a);
border:none;
border-radius:40px;
color:#fff;
cursor:pointer;
font-size:14px;
}

/* SCRATCH SCREEN */

#scratchSection{
display:none;
position:fixed;
width:100%;
height:100vh;
background:#f5f1ea;
justify-content:center;
align-items:center;
flex-direction:column;
}

#dateReveal{
font-family:'Playfair Display',serif;
font-size:32px;
opacity:0;
transition:1s ease;
z-index:1;
}

canvas{
position:absolute;
}

/* FLOWERS */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* MAIN CONTENT */

#mainContent{
display:none;
padding:80px 20px;
min-height:100vh;
background:#f5f1ea;
}

.names{
font-family:'Playfair Display',serif;
font-size:32px;
margin:15px 0;
}

.quote{
margin:20px auto;
max-width:500px;
font-style:italic;
color:#777;
}

.details{
margin-top:30px;
line-height:1.8;
}

.map-btn{
margin-top:30px;
display:inline-block;
padding:12px 30px;
background:#c6a75e;
color:#fff;
border-radius:30px;
text-decoration:none;
}

</style>
</head>

<body>

<!-- INTRO -->
<div id="intro">
<h1>You're Invited</h1>
<button class="open-btn" onclick="startExperience()">Open Invitation</button>
</div>

<!-- SCRATCH -->
<div id="scratchSection">
<div id="dateReveal">
April 27, 2026<br>10:00 AM
</div>
<canvas id="scratchCanvas"></canvas>
</div>

<!-- MAIN CONTENT -->
<div id="mainContent">
<div class="names">Aswathi Ashokan</div>
<div>&</div>
<div class="names">Sam Sunil</div>

<p class="quote">
Two souls, one journey, a lifetime together.
</p>

<div class="details">
VTAM Auditorium<br>
Cherthala near Manorama Junction<br><br>

Bride: Ashokan U P & Mohini P K<br>
Groom: Sunil K Samuel & Thresiamma K A
</div>

<a class="map-btn" href="https://maps.app.goo.gl/mobFw1b7dZiGS3Qf7" target="_blank">
View Location
</a>
</div>

<audio id="music" loop>
<source src="https://cdn.pixabay.com/download/audio/2022/03/15/audio_44f7b1c31c.mp3?filename=wedding-love-11085.mp3" type="audio/mpeg">
</audio>

<script>

function startExperience(){
document.getElementById("intro").style.display="none";
document.getElementById("scratchSection").style.display="flex";
document.getElementById("music").play();
setupScratch();
}

function setupScratch(){
const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle="#c6a75e";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation="destination-out";

let drawing=false;

function getPos(e){
if(e.touches){
return {x:e.touches[0].clientX,y:e.touches[0].clientY};
}
return {x:e.clientX,y:e.clientY};
}

function scratch(e){
if(!drawing) return;
const pos=getPos(e);
ctx.beginPath();
ctx.arc(pos.x,pos.y,35,0,Math.PI*2);
ctx.fill();
checkReveal();
}

canvas.addEventListener("mousedown",()=>drawing=true);
canvas.addEventListener("mouseup",()=>drawing=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>drawing=true);
canvas.addEventListener("touchend",()=>drawing=false);
canvas.addEventListener("touchmove",scratch);

function checkReveal(){
const pixels=ctx.getImageData(0,0,canvas.width,canvas.height);
let cleared=0;

for(let i=0;i<pixels.data.length;i+=4){
if(pixels.data[i+3]===0) cleared++;
}

if(cleared > pixels.data.length*0.25){
document.getElementById("dateReveal").style.opacity="1";
flowerShower();
setTimeout(()=>{
document.getElementById("scratchSection").style.display="none";
document.getElementById("mainContent").style.display="block";
document.body.style.overflow="auto";
},2500);
}
}
}

function flowerShower(){
for(let i=0;i<40;i++){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(flower);
}
}

</script>

</body>
</html>

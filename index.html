<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Aswathi & Sam | Wedding</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Montserrat:wght@300;400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box;}
body{
font-family:'Montserrat',sans-serif;
background:#f4efe8;
overflow:hidden;
}

/* CURTAIN */

#curtain{
position:fixed;
width:100%;
height:100vh;
display:flex;
z-index:1000;
}

.panel{
flex:1;
background:linear-gradient(90deg,#7b1e1e,#a83232);
transition:2s ease;
}

#curtain.open .left{transform:translateX(-100%);}
#curtain.open .right{transform:translateX(100%);}

/* SCRATCH SCREEN */

#scratchContainer{
position:absolute;
width:100%;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
flex-direction:column;
background:#f4efe8;
}

#hiddenContent{
font-family:'Playfair Display',serif;
font-size:30px;
text-align:center;
opacity:0;
transition:1s ease;
}

canvas{
position:absolute;
}

/* FLOWERS */

.flower{
position:fixed;
top:-20px;
font-size:22px;
animation:fall linear forwards;
}

@keyframes fall{
to{transform:translateY(110vh) rotate(360deg);}
}

/* MAIN CONTENT */

#mainContent{
display:none;
height:100vh;
overflow-y:auto;
text-align:center;
padding:60px 20px;
}

.names{
font-family:'Playfair Display',serif;
font-size:32px;
margin:20px 0;
}

.details{
margin-top:30px;
line-height:1.8;
}

.map-btn{
margin-top:25px;
display:inline-block;
padding:12px 30px;
background:goldenrod;
color:#fff;
border-radius:30px;
text-decoration:none;
}

</style>
</head>

<body>

<!-- Curtain -->
<div id="curtain">
<div class="panel left"></div>
<div class="panel right"></div>
</div>

<!-- Scratch Section -->
<div id="scratchContainer">
<div id="hiddenContent">
April 27, 2026<br>10:00 AM
</div>
<canvas id="scratchCanvas"></canvas>
</div>

<!-- Main Content -->
<div id="mainContent">
<div class="names">Aswathi Ashokan</div>
<div>&</div>
<div class="names">Sam Sunil</div>

<div class="details">
VTAM Auditorium<br>
Cherthala near Manorama Junction<br><br>

Bride: Ashokan U P & Mohini P K<br>
Groom: Sunil K Samuel & Thresiamma K A
</div>

<a class="map-btn" href="https://maps.app.goo.gl/mobFw1b7dZiGS3Qf7" target="_blank">
View Location
</a>
</div>

<script>

// OPEN CURTAIN AFTER 1.5s
setTimeout(()=>{
document.getElementById("curtain").classList.add("open");
},1500);

// SCRATCH EFFECT
const canvas = document.getElementById("scratchCanvas");
const ctx = canvas.getContext("2d");

canvas.width = window.innerWidth;
canvas.height = window.innerHeight;

ctx.fillStyle = "#c6a75e";
ctx.fillRect(0,0,canvas.width,canvas.height);

ctx.globalCompositeOperation = "destination-out";

let isDrawing = false;

canvas.addEventListener("mousedown",()=>isDrawing=true);
canvas.addEventListener("mouseup",()=>isDrawing=false);
canvas.addEventListener("mousemove",scratch);

canvas.addEventListener("touchstart",()=>isDrawing=true);
canvas.addEventListener("touchend",()=>isDrawing=false);
canvas.addEventListener("touchmove",(e)=>{
scratch(e.touches[0]);
});

function scratch(e){
if(!isDrawing) return;
ctx.beginPath();
ctx.arc(e.clientX,e.clientY,30,0,Math.PI*2);
ctx.fill();
checkReveal();
}

function checkReveal(){
const pixels = ctx.getImageData(0,0,canvas.width,canvas.height);
let transparent = 0;

for(let i=0;i<pixels.data.length;i+=4){
if(pixels.data[i+3]===0) transparent++;
}

if(transparent > pixels.data.length/8){
document.getElementById("hiddenContent").style.opacity="1";
flowerShower();
setTimeout(()=>{
document.getElementById("scratchContainer").style.display="none";
document.getElementById("mainContent").style.display="block";
document.body.style.overflow="auto";
},2500);
}
}

// FLOWER SHOWER
function flowerShower(){
for(let i=0;i<40;i++){
let flower=document.createElement("div");
flower.className="flower";
flower.innerHTML="🌸";
flower.style.left=Math.random()*100+"vw";
flower.style.animationDuration=(3+Math.random()*3)+"s";
document.body.appendChild(flower);
}
}

</script>

</body>
</html>
